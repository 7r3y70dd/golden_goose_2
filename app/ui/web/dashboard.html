<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Goose Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Golden Goose Dashboard</h1>
    </header>

    <main>
        <section class="health-panel">
            <h2>System Health</h2>
            <div class="status-indicator">
                <span class="status good">All Systems Operational</span>
            </div>
        </section>

        <section class="watchlist-summary">
            <h2>Watchlist Summary</h2>
            <p>Showing 5 items from watchlist</p>
        </section>

        <section class="opportunities-table" id="opportunities-section">
            <h2>Opportunities</h2>
            <div id="dashboard-status"></div>
            <table id="opportunities-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Symbol</th>
                        <th>Score</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="opportunities-body">
                    <!-- Opportunities will be populated here -->
                </tbody>
            </table>
        </section>

        <section class="detail-pane">
            <h2>Details</h2>
            <p>Placeholder for opportunity details</p>
        </section>
    </main>

    <script>
        // Function to render dashboard based on status
        function renderDashboard(data) {
            const statusDiv = document.getElementById('dashboard-status');
            const tableBody = document.getElementById('opportunities-body');
            
            // Clear previous content
            statusDiv.innerHTML = '';
            tableBody.innerHTML = '';
            
            if (data.status === 'empty') {
                statusDiv.innerHTML = '<div class="status empty">' + data.message + '</div>';
                return;
            }
            
            if (data.status === 'stale') {
                statusDiv.innerHTML = '<div class="status stale">' + data.message + '</div>';
                return;
            }
            
            if (data.status === 'success') {
                // Render opportunities
                data.opportunities.forEach((opp, index) => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${index + 1}</td>
                        <td>${opp.symbol}</td>
                        <td>${opp.score}</td>
                        <td>${opp.risk_flags.length > 0 ? opp.risk_flags.join(', ') : 'None'}</div>
                    `;
                    tableBody.appendChild(row);
                });
            }
        }

        // Function to fetch opportunities from API
        async function fetchOpportunities() {
            try {
                const response = await fetch('/api/opportunities');
                const data = await response.json();
                renderDashboard(data);
            } catch (error) {
                console.error('Error fetching opportunities:', error);
                document.getElementById('dashboard-status').innerHTML = '<div class="status error">Failed to load data</div>';
            }
        }

        // Load data when page loads
        fetchOpportunities();
    </script>
</body>
</html>
